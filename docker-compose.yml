services:
  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      PLAYWRIGHT_PROJECT_ROOT: /playwright-project
      PLAYWRIGHT_TESTS_DIR: /playwright-project/tests
    ports:
      - "${SCOUT_PORT:-8009}:8000"
    volumes:
      - ./playwright:/playwright-project
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn scout.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120 --access-logfile -"

  worker:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      PLAYWRIGHT_PROJECT_ROOT: /playwright-project
      PLAYWRIGHT_TESTS_DIR: /playwright-project/tests
    volumes:
      - ./playwright:/playwright-project
    command: >
      sh -c "if [ -f /playwright-project/package.json ] && [ ! -d /playwright-project/node_modules ]; then
               npm install --prefix /playwright-project;
             fi &&
             python manage.py qcluster"
