services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: scout
      POSTGRES_USER: scout
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scout}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scout"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://scout:${POSTGRES_PASSWORD:-scout}@db:5432/scout
      PLAYWRIGHT_PROJECT_ROOT: /playwright-project
      PLAYWRIGHT_TESTS_DIR: /playwright-project/tests
    ports:
      - "${SCOUT_PORT:-8009}:8000"
    volumes:
      - ${PLAYWRIGHT_PROJECT_PATH:-./.playwright-placeholder}:/playwright-project
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn scout.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120 --access-logfile -"

  worker:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://scout:${POSTGRES_PASSWORD:-scout}@db:5432/scout
      PLAYWRIGHT_PROJECT_ROOT: /playwright-project
      PLAYWRIGHT_TESTS_DIR: /playwright-project/tests
    volumes:
      - ${PLAYWRIGHT_PROJECT_PATH:-./.playwright-placeholder}:/playwright-project
    command: python manage.py qcluster

volumes:
  pgdata:
